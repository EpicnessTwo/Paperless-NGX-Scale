  paperless-worker:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.1
    restart: unless-stopped
    command: ["/etc/s6-overlay/s6-rc.d/svc-worker/run"]
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy
    env_file:
      - ./paperless.env
    environment:
      PAPERLESS_TASK_WORKERS: 1
      PAPERLESS_THREADS_PER_WORKER: 2
    volumes:
      - data:/usr/src/paperless/data
      - media:/usr/src/paperless/media
      - ./consume:/usr/src/paperless/consume
      - ./export:/usr/src/paperless/export
      - paperless_tmp:/tmp/paperless
      - ./docker-overrides/skip-init:/etc/s6-overlay/s6-rc.d/init-migrations/run:ro
      - ./docker-overrides/skip-init:/etc/s6-overlay/s6-rc.d/init-search-index/run:ro
      - ./docker-overrides/skip-init:/etc/s6-overlay/s6-rc.d/init-superuser/run:ro
    mem_limit: 1g
    cpus: 4.0

  paperless-scheduler:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.1
    container_name: paperless-scheduler
    restart: unless-stopped
    command: ["/etc/s6-overlay/s6-rc.d/svc-scheduler/run"]
    depends_on:
      paperless-web:
        condition: service_healthy
      db:
        condition: service_healthy
      broker:
        condition: service_healthy
    env_file:
      - ./paperless.env
    volumes:
      - data:/usr/src/paperless/data
      - media:/usr/src/paperless/media
      - ./consume:/usr/src/paperless/consume
      - ./export:/usr/src/paperless/export
      - paperless_tmp:/tmp/paperless
      - ./docker-overrides/skip-init:/etc/s6-overlay/s6-rc.d/init-migrations/run:ro
      - ./docker-overrides/skip-init:/etc/s6-overlay/s6-rc.d/init-search-index/run:ro
      - ./docker-overrides/skip-init:/etc/s6-overlay/s6-rc.d/init-superuser/run:ro
    mem_limit: 512m
    cpus: 0.5

volumes:
  pgdata:
  redisdata:
  data:
  media:
  paperless_tmp:
